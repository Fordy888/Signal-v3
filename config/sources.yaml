#   ai_market_signals — feeds into Strategy & Leadership, Sales & Marketing
#   opportunity_radar — feeds into multiple sections based on content
#   product_service_ideas — feeds into Operations & Workflow, Sales & Marketing
#   threat_detection — feeds into Governance & Risk
#   people_to_watch — feeds into People & Capability
